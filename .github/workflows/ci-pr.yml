name: CI (PR)

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/**"
      - "packages/**"
      - "docker/**"
      - "docker-compose.yml"
      - "apps/web/Dockerfile"
      - "**/package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/**"
      - ".nvmrc"

concurrency:
  group: ci-pr-${{ github.ref }}
  cancel-in-progress: true

# Placeholder CI-only — needed so prisma.config.ts's env("DATABASE_URL")
# resolves during `pnpm install` (postinstall runs `prisma generate`) and
# `pnpm build`. Neither command opens a DB connection.
env:
  DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

jobs:
  validate:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.1

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm --filter @mediasswint/web prisma:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  build:
    name: Build web
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.1

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  docker-build:
    name: Docker build (verify image builds)
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build runner target
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          target: runner
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: mediasswint/web:pr-${{ github.event.pull_request.number }}
