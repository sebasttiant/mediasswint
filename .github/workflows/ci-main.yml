name: CI (main)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-main-${{ github.ref }}
  cancel-in-progress: false

# Placeholder CI-only — needed so prisma.config.ts's env("DATABASE_URL")
# resolves during `pnpm install` (postinstall runs `prisma generate`) and
# `pnpm build`. Neither command opens a DB connection.
env:
  DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

jobs:
  full-validation:
    name: Full validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Security audit
        run: pnpm audit --audit-level moderate

      - name: Prisma validate
        run: pnpm --filter @mediasswint/web prisma:validate

      - name: Prisma generate
        run: pnpm --filter @mediasswint/web prisma:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm --filter @mediasswint/web test:unit

      - name: Build
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  docker-image:
    name: Docker image (runner)
    needs: full-validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build runner
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          target: runner
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: mediasswint/web:main-${{ github.sha }}
