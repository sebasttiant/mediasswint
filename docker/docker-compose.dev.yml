name: mediasswint-dev

services:
  postgres:
    image: postgres:18-alpine
    container_name: mediasswint-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mediass
      POSTGRES_PASSWORD: mediass
      POSTGRES_DB: mediass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediass -d mediass"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:8.6-alpine
    container_name: mediasswint-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  postgres_data:
    name: mediasswint_postgres_data
  redis_data:
    name: mediasswint_redis_data
