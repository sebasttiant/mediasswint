name: mediasswint

# -----------------------------------------------------------------
# Stack de producción (Coolify-friendly).
# - migrate: init service (target: migrator) que corre
#   `prisma migrate deploy`, deja marker de éxito y permanece vivo.
#   Idempotente: si no hay migraciones pendientes, queda healthy sin cambios.
# - web: construido desde apps/web/Dockerfile (target: runner)
# - postgres: 18-alpine con volumen persistente
# - redis: 8.6-alpine con AOF habilitado + volumen persistente
# - restart: unless-stopped en web/postgres/redis/migrate.
# - healthchecks en los 3 servicios de larga duración.
#
# Orden de arranque:
#   postgres healthy -> migrate healthy -> web starts
#   (si migrate falla, web no arranca)
#
# Uso local:
#   docker compose up -d --build
# -----------------------------------------------------------------

services:
  migrate:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: migrator
    image: mediasswint/migrate:latest
    container_name: mediasswint-migrate
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mediass}:${POSTGRES_PASSWORD:-mediass}@postgres:5432/${POSTGRES_DB:-mediass}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/migrated.ok"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: runner
    image: mediasswint/web:latest
    container_name: mediasswint-web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3131}:3131"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-mediass}:${POSTGRES_PASSWORD:-mediass}@postgres:5432/${POSTGRES_DB:-mediass}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3131/api/health').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:18-alpine
    container_name: mediasswint-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mediass}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mediass}
      POSTGRES_DB: ${POSTGRES_DB:-mediass}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mediass} -d ${POSTGRES_DB:-mediass}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:8.6-alpine
    container_name: mediasswint-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  postgres_data:
    name: mediasswint_postgres_data
  redis_data:
    name: mediasswint_redis_data
